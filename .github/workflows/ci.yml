name: CI - Publish malilib and build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      minecraft_version:
        description: 'Minecraft version (optional). If omitted, DEFAULT_MC_VERSION is used.'
        required: false
        default: ''

env:
  DEFAULT_MC_VERSION: "1.21.5"

jobs:
  publish-malilib:
    runs-on: ubuntu-latest
    outputs:
      mc: ${{ steps.mcversion.outputs.mc }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Determine Minecraft version
        id: mcversion
        run: |
          if [ -n "${{ github.event.inputs.minecraft_version }}" ]; then
            echo "mc=${{ github.event.inputs.minecraft_version }}" >> $GITHUB_OUTPUT
          else
            MC="${{ env.DEFAULT_MC_VERSION }}"
            echo "mc=$MC" >> $GITHUB_OUTPUT
          fi

      - name: Read malilib version
        id: malilibversion
        run: |
          set -e
          MC="${{ steps.mcversion.outputs.mc }}"
          PROP_FILE="versions/${MC}.properties"
          if [ ! -f "$PROP_FILE" ]; then
            echo "Error: $PROP_FILE not found"
            exit 1
          fi
          MALIV=$(grep -E '^malilib_version' "$PROP_FILE" | cut -d'=' -f2- | tr -d '[:space:]' | tr -d '"')
          echo "malilib=$MALIV" >> $GITHUB_OUTPUT

      - name: Clone and publish malilib to mavenLocal
        run: |
          set -e
          MALIV="${{ steps.malilibversion.outputs.malilib }}"
          TMP="$(mktemp -d)"
          git clone https://github.com/sakura-ryoko/malilib.git "$TMP"
          cd "$TMP"
          git fetch --all --tags --prune
          git checkout "$MALIV" || true
          ./gradlew publishToMavenLocal -x test --no-daemon

      - name: Upload malilib artifact path
        uses: actions/upload-artifact@v4
        with:
          name: malilib-maven
          path: |
            ~/.m2/repository/com/github/sakura-ryoko

  build:
    needs: publish-malilib
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Download malilib artifact
        uses: actions/download-artifact@v4
        with:
          name: malilib-maven
          path: ./m2_repo_partial

      - name: Merge downloaded artifacts into ~/.m2/repository
        run: |
          mkdir -p ~/.m2/repository
          cp -r ./m2_repo_partial/* ~/.m2/repository/ || true
          ls -R ~/.m2/repository | sed -n '1,200p'

      - name: Determine Minecraft version (from previous job)
        run: |
          echo "mc=${{ needs.publish-malilib.outputs.mc }}" > mc.txt
          cat mc.txt

      - name: Build project
        run: |
          MC="${{ needs.publish-malilib.outputs.mc }}"
          ./gradlew build -Pminecraft_version="$MC" --no-daemon
